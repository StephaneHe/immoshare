services:
  postgres:
    image: postgres:16-alpine
    container_name: immoshare-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: immo
      POSTGRES_PASSWORD: immo
      POSTGRES_DB: immoshare
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U immo -d immoshare']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
